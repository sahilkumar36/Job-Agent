{% extends 'jobs/base.html' %}

{% block content %}
<div class="animate-fade" style="max-width: 800px; margin: 0 auto;">
    <h1>Analyze a New Job</h1>
    <p style="color: var(--text-dim); margin-bottom: 2rem;">Paste the job description and your skills to get an AI-powered match analysis.</p>

    <div class="glass-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <label style="display: block; margin-bottom: 0.5rem;">Job Title</label>
            <input type="text" name="title" placeholder="e.g. Senior Software Engineer" required>

            <label style="display: block; margin-bottom: 0.5rem;">Company</label>
            <input type="text" name="company" placeholder="e.g. Google, Inc." required>

            <label style="display: block; margin-bottom: 0.5rem;">Job URL</label>
            <input type="url" name="url" placeholder="https://linkedin.com/jobs/..." required>

            <label style="display: block; margin-bottom: 0.5rem;">Job Description</label>
            <textarea name="description" rows="10" placeholder="Paste the full job description here..." required></textarea>

            <label style="display: block; margin-bottom: 0.5rem;">Upload Resume (PDF)</label>
            <input type="file" name="resume" accept=".pdf" style="margin-bottom: 1.5rem;">

            <p style="text-align: center; color: var(--text-dim); margin-top: -1rem; margin-bottom: 1rem;">OR</p>

            <label style="display: block; margin-bottom: 0.5rem;">Manually Enter Skills</label>
            <textarea name="user_skills" rows="5" placeholder="List your key skills (Python, Django, AWS, etc.)"></textarea>

            {% if error %}
            <div style="background: rgba(239, 68, 68, 0.1); color: #ef4444; padding: 1rem; border-radius: 12px; margin-bottom: 1rem;">
                Error: {{ error }}
            </div>
            {% endif %}

            <button id="submitBtn" type="submit" class="btn" style="width: 100%; border-radius: 12px; height: 3.5rem; font-size: 1.1rem; margin-top: 1rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem;">
                <span id="btnText">Run AI Analysis</span>
                <div id="spinner" class="spinner" style="display: none;"></div>
            </button>
        </form>
    </div>
</div>

<style>
    .spinner {
        width: 20px;
        height: 20px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    button:disabled {
        opacity: 0.7;
        cursor: not-allowed;
    }
</style>

<script>
    document.querySelector('form').addEventListener('submit', function(e) {
        const btn = document.getElementById('submitBtn');
        const text = document.getElementById('btnText');
        const spinner = document.getElementById('spinner');
        
        btn.disabled = true;
        text.innerText = "Analyzing with AI...";
        spinner.style.display = "block";
    });
</script>
{% endblock %}
